<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>welcome!</title>

    <!-- Minecraft font -->
    <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('images/background.png'); /* Updated background */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Minecraftia', monospace;
            color: white;
        }

        h1 {
            font-size: 5em;
            text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>
    <h1>Hello</h1>

    <!-- Background music -->
    <audio id="bg-music" autoplay loop muted>
        <source src="aspartame/images/aria.m4a" type="audio/mp4">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Enable sound after first click (required by browsers)
        document.addEventListener('click', function () {
            const audio = document.getElementById('bg-music');
            audio.muted = false;
            audio.play();
        });
    </script>
</body>
</html>
